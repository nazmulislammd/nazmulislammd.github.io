project:
  type: website
  output-dir: docs
  resources:
    - images/moon-icon.png
    - images/sun-icon.png

website:
  title: "Md. Nazmul Islam"
  navbar:
    pinned: true
    left:
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: visualizations.qmd
        text: Visualizations  
      - href: cv.qmd
        text: CV
      - href: blog.qmd
        text: Blog
      - href: timeline.qmd
        text: Timeline

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
      - text: |
          <script>
          document.addEventListener("DOMContentLoaded", function () {
            const nav = document.querySelector(".navbar-nav");
            if (!nav) return;

            const btn = document.createElement("button");
            btn.id = "theme-toggle";
            btn.type = "button";
            btn.setAttribute("aria-label", "Toggle color mode");

            const icon = document.createElement("img");
            icon.id = "theme-toggle-icon";
            icon.alt = "Toggle theme";
            btn.appendChild(icon);

            const item = document.createElement("li");
            item.className = "nav-item";
            item.appendChild(btn);
            nav.appendChild(item);

            function setTheme(mode) {
              document.body.classList.toggle("dark-mode", mode === "dark");
              localStorage.setItem("site-theme", mode);
              const iconBase = window.location.pathname.includes("/posts/") ? "../images/" : "images/";
              icon.src = mode === "dark"
              ? iconBase + "moon-icon.png"
              : iconBase + "sun-icon.png";
            }

            const savedTheme =
              localStorage.getItem("site-theme") === "dark" ? "dark" : "light";
            setTheme(savedTheme);

            btn.addEventListener("click", function () {
              const newTheme = document.body.classList.contains("dark-mode")
                ? "light"
                : "dark";
              setTheme(newTheme);
            });
          });
          </script>